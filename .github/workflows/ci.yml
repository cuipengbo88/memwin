name: ci
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run hook tests (if tests/ exists)
        shell: pwsh
        run: |
          if (Test-Path 'tests') {
            node --test tests/*.test.mjs
          } else {
            Write-Host "SKIP: tests/ directory not found, skipping tests"
          }

      - name: Verify setup.ps1 syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            'setup.ps1', [ref]$null, [ref]$null
          )
          if ($ast) { Write-Host "setup.ps1 syntax OK" }

      - name: List repository files
        shell: pwsh
        run: |
          Write-Host "=== Repository file listing (first 50) ==="
          Get-ChildItem -Recurse -Name | Select-Object -First 50

      - name: Check required files exist
        shell: pwsh
        run: |
          $required = @(
            'setup.ps1',
            'CLAUDE.md',
            'README.md',
            'README.zh.md',
            'LICENSE',
            'hooks/note-taking-context.mjs',
            'hooks/session-end-check.mjs',
            'wiki/notes/_template.md',
            'wiki/concepts/_template.md',
            'wiki/decisions/_template.md',
            'wiki/methods/_template.md',
            '.claude/settings.json'
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path $f)) {
              $missing += $f
              Write-Host "MISSING: $f"
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "ERROR: $($missing.Count) required files missing"
            exit 1
          }
