name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run hook tests
        run: node --test tests/*.test.mjs

      - name: Verify setup.ps1 syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Validate PowerShell syntax without executing
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            'setup.ps1', [ref]$null, [ref]$null
          )
          if ($ast) { Write-Host "setup.ps1 syntax OK" }

      - name: Check required files exist
        shell: pwsh
        run: |
          $required = @(
            'setup.ps1',
            'CLAUDE.md',
            'README.md',
            'README.zh.md',
            'LICENSE',
            'hooks/note-taking-context.mjs',
            'hooks/session-end-check.mjs',
            'wiki/notes/_template.md',
            'wiki/concepts/_template.md',
            'wiki/decisions/_template.md',
            'wiki/methods/_template.md',
            '.claude/settings.json'
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path $f)) {
              $missing += $f
              Write-Host "MISSING: $f"
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "ERROR: $($missing.Count) required files missing"
            exit 1
          }
